<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Match Predictor</title>
<style>
  :root {
    --bg: #0b1020;
    --card: #151c33;
    --accent: #38bdf8;
    --win: #22c55e;
    --draw: #eab308;
    --loss: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, var(--bg));
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center; padding: 32px 16px;
  }
  .wrap { width: 100%; max-width: 560px; }
  h1 { font-size: 1.7rem; margin: 0 0 4px; text-align: center; }
  .sub { color: var(--muted); text-align: center; margin: 0 0 28px; font-size: .95rem; }
  .card {
    background: var(--card); border: 1px solid #243049;
    border-radius: 16px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  label { display: block; font-size: .8rem; color: var(--muted); margin: 14px 0 6px; }
  select {
    width: 100%; padding: 12px; border-radius: 10px;
    background: #0f1730; color: var(--text); border: 1px solid #2b3a5c;
    font-size: 1rem;
  }
  .vs { text-align: center; color: var(--accent); font-weight: 700; margin: 16px 0 4px; }
  .row { display: flex; align-items: center; gap: 8px; margin-top: 16px; color: var(--muted); font-size: .9rem; }
  .row input { width: 18px; height: 18px; }
  button {
    width: 100%; margin-top: 20px; padding: 14px;
    background: var(--accent); color: #052338; border: none;
    border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }
  .result { margin-top: 22px; display: none; }
  .verdict { text-align: center; font-size: 1.15rem; margin-bottom: 18px; }
  .bar-group { margin-bottom: 14px; }
  .bar-top { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
  .track { background: #0f1730; border-radius: 999px; height: 14px; overflow: hidden; }
  .fill { height: 100%; border-radius: 999px; transition: width .6s ease; }
  .foot { text-align: center; color: var(--muted); font-size: .75rem; margin-top: 26px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>⚽ World Cup Match Predictor</h1>
    <p class="sub">Built from every international match since 1872</p>

    <div class="card">
      <label for="teamA">Team A (home side)</label>
      <select id="teamA"></select>

      <div class="vs">vs</div>

      <label for="teamB">Team B (away side)</label>
      <select id="teamB"></select>

      <div class="row">
        <input type="checkbox" id="neutral" checked>
        <label for="neutral" style="margin:0;">Neutral venue (typical for World Cup) — no home advantage</label>
      </div>

      <button onclick="predict()">Predict result</button>

      <div class="result" id="result">
        <div class="verdict" id="verdict"></div>
        <div class="score" id="score" style="text-align:center;margin-bottom:18px;"></div>
        <div class="bar-group">
          <div class="bar-top"><span id="labelA">Team A win</span><span id="pctA"></span></div>
          <div class="track"><div class="fill" id="barA" style="background:var(--win);"></div></div>
        </div>
        <div class="bar-group">
          <div class="bar-top"><span>Draw</span><span id="pctD"></span></div>
          <div class="track"><div class="fill" id="barD" style="background:var(--draw);"></div></div>
        </div>
        <div class="bar-group">
          <div class="bar-top"><span id="labelB">Team B win</span><span id="pctB"></span></div>
          <div class="track"><div class="fill" id="barB" style="background:var(--loss);"></div></div>
        </div>
      </div>
    </div>

    <p class="foot">Machine-learning model combining team strength, FIFA ranking, squad value &amp; recent form. ~79% winner accuracy on unseen games.</p>
  </div>

<script src="mlmodel.js"></script>
<script>
  const MAX_GOALS = ML.MAX_GOALS;
  const teamData = ML.teams;

  // Fill both dropdowns with current teams, sorted strongest first.
  const teams = Object.keys(teamData).sort(
    (a, b) => (teamData[b].atk + teamData[b].def) - (teamData[a].atk + teamData[a].def)
  );
  const selA = document.getElementById("teamA");
  const selB = document.getElementById("teamB");
  for (const t of teams) {
    selA.add(new Option(t, t));
    selB.add(new Option(t, t));
  }
  selA.value = teams.includes("Brazil") ? "Brazil" : teams[0];
  selB.value = teams.includes("Argentina") ? "Argentina" : teams[1];

  function factorial(k) {
    let f = 1;
    for (let i = 2; i <= k; i++) f *= i;
    return f;
  }
  function poisson(k, lam) {
    return Math.exp(-lam) * Math.pow(lam, k) / factorial(k);
  }
  // Goals-model win/draw/loss probabilities (used as ML features + scoreline).
  function goalProbs(lamH, lamA) {
    let ph = 0, pd = 0, pa = 0;
    for (let i = 0; i <= MAX_GOALS; i++) {
      const pi = poisson(i, lamH);
      for (let j = 0; j <= MAX_GOALS; j++) {
        const p = pi * poisson(j, lamA);
        if (i > j) ph += p; else if (i === j) pd += p; else pa += p;
      }
    }
    return [ph, pd, pa];
  }

  function predict() {
    const a = selA.value, b = selB.value;
    if (a === b) { alert("Pick two different teams!"); return; }

    const A = teamData[a], B = teamData[b];   // A = home side, B = away side
    const neutral = document.getElementById("neutral").checked;
    const boost = neutral ? 0 : ML.HOME_ADV;

    // Expected goals (A at home) for features + the predicted scoreline.
    let lamA = Math.min(Math.max(Math.exp(ML.C + boost + A.atk - B.def), 0.05), 8.0);
    let lamB = Math.min(Math.max(Math.exp(ML.C + B.atk - A.def), 0.05), 8.0);
    const [gph, gpd, gpa] = goalProbs(lamA, lamB);

    // FIFA + squad-value differences (with 'missing' flags, matching training).
    let fifaDiff = 0, fifaMissing = 1;
    if (A.fifa != null && B.fifa != null) { fifaDiff = A.fifa - B.fifa; fifaMissing = 0; }
    let valDiff = 0, valMissing = 1;
    if (A.vlog != null && B.vlog != null) { valDiff = A.vlog - B.vlog; valMissing = 0; }

    // The 14 features, in the exact order the model was trained on.
    const feats = [
      lamA, lamB, lamA - lamB, gph, gpd, gpa,
      (A.atk + A.def) - (B.atk + B.def), neutral ? 0 : 1,
      fifaDiff, fifaMissing, valDiff, valMissing, A.form, B.form
    ];

    // Standardize, then run the logistic-regression model -> softmax.
    const scores = ML.intercept.map((ic, k) => {
      let s = ic;
      for (let i = 0; i < feats.length; i++) {
        const z = (feats[i] - ML.mean[i]) / ML.scale[i];
        s += ML.coef[k][i] * z;
      }
      return s;
    });
    const m = Math.max(...scores);
    const exp = scores.map(s => Math.exp(s - m));
    const sum = exp[0] + exp[1] + exp[2];
    // classes [0,1,2] = home win, draw, away win
    const pA = exp[0] / sum, pDraw = exp[1] / sum, pB = exp[2] / sum;

    const fmt = x => (x * 100).toFixed(0) + "%";
    document.getElementById("labelA").textContent = a + " win";
    document.getElementById("labelB").textContent = b + " win";
    document.getElementById("pctA").textContent = fmt(pA);
    document.getElementById("pctD").textContent = fmt(pDraw);
    document.getElementById("pctB").textContent = fmt(pB);
    document.getElementById("barA").style.width = fmt(pA);
    document.getElementById("barD").style.width = fmt(pDraw);
    document.getElementById("barB").style.width = fmt(pB);

    // Top 3 most likely exact scorelines (from the full goal grid).
    const scoreList = [];
    for (let i = 0; i <= MAX_GOALS; i++) {
      const pi = poisson(i, lamA);
      for (let j = 0; j <= MAX_GOALS; j++) {
        scoreList.push({ i, j, p: pi * poisson(j, lamB) });
      }
    }
    scoreList.sort((x, y) => y.p - x.p);
    const top3 = scoreList.slice(0, 3).map((s, n) =>
      `<div style="font-size:${n === 0 ? "1.5rem" : "1.05rem"};font-weight:${n === 0 ? 800 : 600};
        margin:3px 0;opacity:${n === 0 ? 1 : 0.75};">
        ${a} ${s.i}–${s.j} ${b}
        <span style="color:var(--accent);font-weight:600;">${(s.p * 100).toFixed(0)}%</span>
      </div>`).join("");
    document.getElementById("score").innerHTML =
      `<div style="font-size:.75rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Most likely scores</div>${top3}`;

    // A friendly verdict line.
    let verdict;
    const top = Math.max(pA, pDraw, pB);
    if (top === pDraw) verdict = `Too close to call — a draw looks likely`;
    else if (top === pA) verdict = `<b>${a}</b> are favourites`;
    else verdict = `<b>${b}</b> are favourites`;
    document.getElementById("verdict").innerHTML = verdict;

    document.getElementById("result").style.display = "block";
  }
</script>
</body>
</html>
